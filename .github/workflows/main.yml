name: Build Check

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Check if project builds
      run: |
        echo "🔨 Checking if project builds..."
        
        # Look for build files
        if [ -f "pom.xml" ]; then
          echo "📦 Maven project detected"
          mvn compile
        elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          echo "📦 Gradle project detected"
          gradle compileJava
        elif [ -f "build.xml" ]; then
          echo "📦 Ant project detected"
          ant compile
        else
          # No build tool, just try to compile all Java files
          echo "📁 No build tool detected, compiling Java files directly"
          JAVA_FILES=$(find . -name "*.java")
          
          if [ -z "$JAVA_FILES" ]; then
            echo "❌ No Java files found"
            exit 1
          fi
          
          mkdir -p out
          javac -d out $JAVA_FILES
        fi
        
        if [ $? -eq 0 ]; then
          echo "✅ Project builds successfully!"
        else
          echo "❌ Build failed"
          exit 1
        fi
