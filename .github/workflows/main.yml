name: Build and Test with Coverage

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for Coveralls
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Find and run Maven tests with coverage
      run: |
        # Find pom.xml file
        POM_FILE=$(find . -name "pom.xml" -type f | head -n 1)
        
        if [ -n "$POM_FILE" ]; then
          echo "📦 Found Maven project at: $POM_FILE"
          PROJECT_DIR=$(dirname "$POM_FILE")
          cd "$PROJECT_DIR"
          echo "📁 Working directory: $(pwd)"
          echo "📋 Running: mvn clean test jacoco:report"
          mvn clean test jacoco:report
        else
          echo "❌ No pom.xml found in repository"
          exit 1
        fi
        
    - name: List coverage reports
      run: |
        echo "📊 Coverage reports:"
        find . -name "jacoco.xml" -o -name "jacoco.csv" -o -name "index.html" | grep -v ".git"
        
    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: ./**/target/site/jacoco/jacoco.xml
        format: jacoco
        base-path: ./PhonebookValidator
        
    - name: Upload test reports (optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          **/target/surefire-reports/
          **/target/site/jacoco/
