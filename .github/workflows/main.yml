name: Test Committed Code

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug - Show repository structure
      run: |
        echo "Current directory:"
        pwd
        echo -e "\nAll files:"
        ls -la
        echo -e "\nJava files location:"
        find . -name "*.java" | head -10
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Compile Java files
      run: |
        echo "Finding all Java files..."
        find . -name "*.java" > sources.txt
        
        if [ ! -s sources.txt ]; then
          echo "❌ No Java files found in the repository!"
          echo "Make sure your Java files are committed and pushed."
          exit 1
        fi
        
        echo "✅ Found $(wc -l < sources.txt) Java files"
        echo -e "\nCompiling..."
        
        mkdir -p out
        javac -d out @sources.txt
        
        if [ $? -eq 0 ]; then
          echo "✅ Compilation successful!"
          echo "Compiled classes are in the 'out' directory"
        else
          echo "❌ Compilation failed"
          exit 1
        fi
        
    - name: Run tests (if any)
      run: |
        # Look for test files in common patterns
        TEST_FILES=$(find . -name "*Test.java" -o -name "Test*.java" | wc -l)
        
        if [ "$TEST_FILES" -gt 0 ]; then
          echo "Found $TEST_FILES test files"
          echo "Note: This workflow only compiles, doesn't run JUnit tests"
          echo "To run JUnit tests, you'll need to add JUnit to classpath"
        else
          echo "No test files found"
        fi
