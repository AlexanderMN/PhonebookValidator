name: Build and Test with Coverage

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run tests with JaCoCo
      run: |
        cd PhonebookValidator
        
        # First, compile everything
        echo "=== Compiling ==="
        mvn clean compile test-compile
        
        echo "=== Checking compiled classes ==="
        if [ -d "target/classes" ]; then
          echo "✅ Main classes compiled:"
          ls -la target/classes/
        else
          echo "❌ target/classes directory not found!"
        fi
        
        if [ -d "target/test-classes" ]; then
          echo "✅ Test classes compiled:"
          ls -la target/test-classes/
        else
          echo "❌ target/test-classes directory not found!"
        fi
        
        echo "=== Running tests ==="
        mvn test
        
        echo "=== Checking JaCoCo data ==="
        if [ -f "target/jacoco.exec" ]; then
          echo "✅ JaCoCo execution data found:"
          ls -la target/jacoco.exec
        else
          echo "❌ No JaCoCo execution data found!"
        fi
        
        echo "=== Generating JaCoCo report ==="
        mvn jacoco:report
        
        echo "=== Checking report ==="
        if [ -d "target/site/jacoco" ]; then
          echo "✅ Report generated:"
          ls -la target/site/jacoco/
        else
          echo "❌ Report not generated!"
        fi

    
    - name: Debug - Find coverage reports
      if: always()  # Run even if tests fail
      run: |
        echo "=== Searching for coverage reports ==="
        find . -name "jacoco.xml" 2>/dev/null || echo "No jacoco.xml found"
        echo ""
        echo "=== Searching for jacoco directories ==="
        find . -type d -name "jacoco" 2>/dev/null || echo "No jacoco directories found"
        echo ""
        echo "=== Full directory structure ==="
        ls -laR | head -100
    
    - name: Upload coverage to Coveralls
      if: success()  # Only run if tests passed
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: |
          ./target/site/jacoco/jacoco.xml
          ./PhonebookValidator/target/site/jacoco/jacoco.xml
          **/target/site/jacoco/jacoco.xml
        format: jacoco
