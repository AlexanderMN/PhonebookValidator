name: Test Committed Code

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Also updated to v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4  # Updated to v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Run tests
      run: mvn test
      continue-on-error: false
      
    - name: Upload test results (even if tests fail)
      if: always()
      uses: actions/upload-artifact@v4  # Updated to v4
      with:
        name: test-results-${{ github.sha }}
        path: target/surefire-reports/
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "Tests failed for commit: ${{ github.sha }}"
        echo "Check test results artifact for details"
